<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediTrack</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- modificacion de prueba -->
<style>
  :root{--teal:#0e8f86;--teal-d:#0b6f68;--navy:#17324d;--bg:#f4f6f9;--line:#e3e8ee;--red:#d64545;--gray:#5c6c73}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--navy)}
  .header{background:#fff;border-bottom:1px solid var(--line);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:5}
  .brand{font-size:20px;font-weight:800;color:var(--teal)}
  .brand small{color:var(--gray);font-weight:500;font-size:12px}
  .health{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray);margin-left:auto}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb}
  .dot.ok{background:#2e9e5b}.dot.bad{background:var(--red)}
  .count{background:#eef3f2;color:var(--teal-d);font-weight:700;border-radius:20px;padding:4px 12px;font-size:13px}
  .wrap{max-width:1000px;margin:22px auto;padding:0 20px}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px}
  .search{flex:1;position:relative}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff}
  .search svg{position:absolute;left:12px;top:11px;color:var(--gray)}
  .btn{border:0;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--teal);color:#fff}.btn.primary:hover{background:var(--teal-d)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
  .btn.danger{background:#fff;border:1px solid #edc9c9;color:var(--red)}.btn.danger:hover{background:#fdecec}
  .btn.sm{padding:7px 12px;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(20,40,60,.05);transition:.15s}
  .card:hover{box-shadow:0 6px 18px rgba(20,40,60,.09);transform:translateY(-2px)}
  .card h3{margin:0 0 2px;font-size:16px}
  .card .meta{color:var(--gray);font-size:13px;margin-bottom:10px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .badge.alergia{background:#fdeaea;color:var(--red)}.badge.ok{background:#eaf5ee;color:#2e9e5b}
  .card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .overlay{position:fixed;inset:0;background:rgba(20,35,50,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:17px}
  .icon-btn{border:0;background:none;font-size:22px;color:var(--gray);cursor:pointer;line-height:1}
  .modal-body{padding:20px}
  .form{display:flex;flex-direction:column;gap:12px}
  .form label{font-size:13px;font-weight:600;display:flex;flex-direction:column;gap:5px}
  .form input{padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit}
  .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:6px}
  .reg{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;background:#fbfcfd}
  .reg .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .reg .fecha{font-size:12px;color:var(--gray)}
  .reg .dx{font-weight:700}
  .reg .row{font-size:13px;margin-top:2px}
  .empty{text-align:center;color:var(--gray);padding:40px;background:#fff;border:1px dashed var(--line);border-radius:14px}
  .toast{position:fixed;top:18px;right:18px;padding:12px 18px;border-radius:10px;color:#fff;font-weight:600;font-size:14px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .toast.success{background:#2e9e5b}.toast.error{background:var(--red)}
  .muted{color:var(--gray);font-size:13px}
  .divider{border:0;border-top:1px solid var(--line);margin:16px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
