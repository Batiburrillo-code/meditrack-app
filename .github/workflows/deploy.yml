name: CI/CD - MediTrack API a AKS
on:
  push:
    branches: [ main ]
env:
  ACR_NAME: acrdevopsfinalas2
  RG: rg-devops-curso-AS2
  AKS_NAME: aks-devops-final-as2
  NS: meditrack-dev
  IMAGE: meditrack-api
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build y push a ACR
        run: az acr build --registry $ACR_NAME --image $IMAGE:${{ github.sha }} ./api
      - name: Credenciales de AKS
        run: az aks get-credentials --resource-group $RG --name $AKS_NAME --overwrite-existing
      - name: Desplegar en AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/meditrack-api meditrack-api=$ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }} -n $NS
          kubectl rollout status deployment/meditrack-api -n $NS
