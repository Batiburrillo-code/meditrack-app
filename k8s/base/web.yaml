apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditrack-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meditrack-web
  template:
    metadata:
      labels:
        app: meditrack-web
    spec:
      containers:
        - name: meditrack-web
          image: meditrack-web:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: meditrack-web-service
spec:
  type: NodePort
  selector:
    app: meditrack-web
  ports:
    - port: 80
      targetPort: 80
